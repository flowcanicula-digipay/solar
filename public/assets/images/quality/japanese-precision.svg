<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3461"/>
      <stop offset="100%" stop-color="#0C1F3F"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce8ff"/>
      <stop offset="100%" stop-color="#F8F5EE"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#skyGrad)"/>

  <!-- sun + radiance rings -->
  <g>
    <circle cx="160" cy="140" r="120" fill="#F59E0B" opacity="0.06"/>
    <circle cx="160" cy="140" r="80" fill="#F59E0B" opacity="0.09"/>
    <circle cx="160" cy="140" r="46" fill="#F59E0B"/>
  </g>

  <!-- distant skyline silhouette -->
  <g fill="#0C1F3F" opacity="0.08">
    <rect x="40" y="430" width="36" height="170"/>
    <rect x="86" y="380" width="28" height="220"/>
    <rect x="124" y="450" width="40" height="150"/>
    <rect x="640" y="400" width="32" height="200"/>
    <rect x="682" y="440" width="44" height="160"/>
    <rect x="736" y="370" width="30" height="230"/>
  </g>

  <!-- roofline -->
  <path d="M0 470 L260 470 L320 410 L380 470 L800 470 L800 600 L0 600 Z" fill="#0C1F3F"/>
  <rect x="0" y="462" width="800" height="10" fill="#1A3461"/>

  <!-- solar array, tilted, mounted to roof -->
  <g transform="translate(230,250) rotate(-6)">
    <rect x="0" y="0" width="360" height="220" rx="6" fill="url(#panelGrad)"/>
    <!-- cell grid -->
    <g stroke="#2E5096" stroke-width="2">
      <line x1="0" y1="55" x2="360" y2="55"/>
      <line x1="0" y1="110" x2="360" y2="110"/>
      <line x1="0" y1="165" x2="360" y2="165"/>
      <line x1="60" y1="0" x2="60" y2="220"/>
      <line x1="120" y1="0" x2="120" y2="220"/>
      <line x1="180" y1="0" x2="180" y2="220"/>
      <line x1="240" y1="0" x2="240" y2="220"/>
      <line x1="300" y1="0" x2="300" y2="220"/>
    </g>
    <!-- glint -->
    <path d="M20 0 L70 0 L20 220 L-30 220 Z" fill="#F8F5EE" opacity="0.07"/>
    <path d="M140 0 L175 0 L125 220 L90 220 Z" fill="#F8F5EE" opacity="0.05"/>
    <!-- frame -->
    <rect x="0" y="0" width="360" height="220" rx="6" fill="none" stroke="#003baf" stroke-width="4"/>
    <!-- mounting brackets -->
    <rect x="30" y="215" width="14" height="34" fill="#1A3461"/>
    <rect x="316" y="215" width="14" height="34" fill="#1A3461"/>
  </g>

  <!-- precision torque mark on bracket -->
  <g transform="translate(253,498)">
    <circle r="11" fill="none" stroke="#F59E0B" stroke-width="3"/>
    <path d="M-5 0 L5 0 M0 -5 L0 5" stroke="#F59E0B" stroke-width="2"/>
  </g>

  <!-- 25-year seal -->
  <g transform="translate(610,430)">
    <circle r="92" fill="#003baf"/>
    <circle r="92" fill="none" stroke="#F8F5EE" stroke-width="3" stroke-dasharray="4 6"/>
    <circle r="76" fill="none" stroke="#dce8ff" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#FFFFFF">25</text>
    <text x="0" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" letter-spacing="2" fill="#dce8ff">YEAR</text>
    <path d="M-26 -52 Q-40 -20 -26 16" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M26 -52 Q40 -20 26 16" stroke="#F59E0B" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
