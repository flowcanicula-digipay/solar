<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- A solar panel feeding a battery with a broken grid line beneath —
       self-sufficiency, not a generic clock or plug glyph -->
  <!-- Sun rays (top) -->
  <line x1="18" y1="2" x2="18" y2="4.5" stroke="#FFCD00" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="24.2" y1="3.8" x2="23.0" y2="5.8" stroke="#FFCD00" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="11.8" y1="3.8" x2="13.0" y2="5.8" stroke="#FFCD00" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="27.5" y1="7.5" x2="25.8" y2="8.8" stroke="#FFCD00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8.5" y1="7.5" x2="10.2" y2="8.8" stroke="#FFCD00" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Sun circle -->
  <circle cx="18" cy="8" r="3.2" fill="#FFCD00"/>
  <!-- Solar panel body -->
  <rect x="9" y="13" width="18" height="10" rx="1" fill="#1A3461"/>
  <!-- Panel cell grid -->
  <line x1="15" y1="13" x2="15" y2="23" stroke="#2E5096" stroke-width="0.7"/>
  <line x1="21" y1="13" x2="21" y2="23" stroke="#2E5096" stroke-width="0.7"/>
  <line x1="9" y1="17.5" x2="27" y2="17.5" stroke="#2E5096" stroke-width="0.7"/>
  <!-- Panel sheen -->
  <path fill="#F5E6C8" opacity="0.08" d="M10 13.5 L18 13.5 L12 22.5 L9.5 22.5 Z"/>
  <!-- Panel frame -->
  <rect x="9" y="13" width="18" height="10" rx="1" fill="none" stroke="#D98A2B" stroke-width="0.9"/>
  <!-- Wire down from panel -->
  <line x1="18" y1="23" x2="18" y2="26.5" stroke="#8B5A2B" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Battery body -->
  <rect x="12" y="26.5" width="12" height="6" rx="1.2" fill="#E2C896"/>
  <rect x="15.5" y="25.2" width="5" height="1.5" rx="0.6" fill="#C49A6C"/>
  <!-- Battery charge indicator — filled 2/3 -->
  <rect x="13.2" y="27.7" width="7.5" height="3.5" rx="0.7" fill="#4F7A52"/>
  <rect x="13.2" y="27.7" width="9.6" height="3.5" rx="0.7" fill="none" stroke="#8B5A2B" stroke-width="0.7"/>
  <!-- Lightning bolt on battery — energy stored -->
  <path fill="#FFCD00" d="M18.8 28.2 L17 30.5 L18.2 30.5 L17.2 32.5 L19.5 29.8 L18.2 29.8Z"/>
  <!-- Broken grid line below (struck-through) -->
  <line x1="4" y1="34" x2="10" y2="34" stroke="#C49A6C" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="13" y1="34" x2="14.5" y2="34" stroke="#C49A6C" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="21.5" y1="34" x2="23" y2="34" stroke="#C49A6C" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="26" y1="34" x2="32" y2="34" stroke="#C49A6C" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <!-- Break X mark -->
  <line x1="16" y1="32.8" x2="20" y2="35.2" stroke="#DA251D" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="20" y1="32.8" x2="16" y2="35.2" stroke="#DA251D" stroke-width="1.1" stroke-linecap="round"/>
</svg>
