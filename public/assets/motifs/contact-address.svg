<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- A traditional Vietnamese tube house (nhà ống) as a location marker —
       narrow facade, tiled roof, the actual SolarTNP address form -->
  <!-- Drop shadow -->
  <ellipse cx="18" cy="33" rx="9" ry="1.5" fill="#243329" opacity="0.2"/>
  <!-- Pin stem -->
  <path fill="#B86F1C" d="M18 20 L15.5 33 L18 30.5 L20.5 33Z"/>
  <!-- Pin circle -->
  <circle cx="18" cy="13.5" r="11" fill="#DA251D"/>
  <circle cx="18" cy="13.5" r="8.5" fill="#C61E16"/>
  <!-- House facade inside pin -->
  <rect x="13.5" y="11.5" width="9" height="7.5" rx="0.6" fill="#F5E6C8"/>
  <!-- Roof -->
  <path fill="#B86F1C" d="M12 12.2 18 7.5 24 12.2Z"/>
  <path fill="#D98A2B" opacity="0.6" d="M18 7.5 22 11 24 12.2Z"/>
  <!-- Door -->
  <rect x="16.2" y="15.5" width="3.6" height="3.5" rx="0.5" fill="#B86F1C"/>
  <!-- Windows -->
  <rect x="13.8" y="12.4" width="2.5" height="2.2" rx="0.4" fill="#5DADEC" opacity="0.8"/>
  <rect x="19.7" y="12.4" width="2.5" height="2.2" rx="0.4" fill="#5DADEC" opacity="0.8"/>
  <!-- Gold star on roof peak -->
  <path fill="#FFCD00" d="M18 5.2 18.5 6.6 20 6.6 18.8 7.5 19.2 8.9 18 8 16.8 8.9 17.2 7.5 16 6.6 17.5 6.6Z"/>
</svg>
