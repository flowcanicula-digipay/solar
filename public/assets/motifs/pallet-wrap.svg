  <g fill="#B86F1C">
    <rect x="5" y="27.2" width="3" height="3.4"/>
    <rect x="13" y="27.2" width="3" height="3.4"/>
    <rect x="21" y="27.2" width="3" height="3.4"/>
    <rect x="28" y="27.2" width="3" height="3.4"/>
  </g>
  <rect x="6" y="10" width="24" height="14" rx="1" fill="#E2C896"/>
  <rect x="6" y="10" width="24" height="14" rx="1" fill="none" stroke="#D9B872" stroke-width="0.8"/>
  <g stroke="#4F7A52" stroke-width="2" opacity="0.85">
    <line x1="6" y1="14.5" x2="30" y2="14.5"/>
