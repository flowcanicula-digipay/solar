<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- Log, plane, and roof strung on one cord — one team carrying the
       work from raw timber to finished room, not a generic checkmark -->
  <path stroke="#D98A2B" stroke-width="1.4" stroke-linecap="round" fill="none"
    d="M7 27c2-3 4-4 6-4s3 2 5 2 3-2 5-2 4 1 6 4"/>

  <!-- Log -->
  <circle cx="7" cy="27" r="4.6" fill="#E2C896"/>
  <circle cx="7" cy="27" r="2.6" fill="none" stroke="#B86F1C" stroke-width="0.8"/>
  <circle cx="7" cy="27" r="1.1" fill="#8B5A2B"/>

  <!-- Hand plane -->
  <g transform="translate(13.5,15.5)">
    <path fill="#B86F1C" d="M0 6.5c0-2.4 2.6-4.3 6-4.3s6 1.9 6 4.3-1.6 2.7-3.2 2.7H3.2C1.6 9.2 0 8.9 0 6.5Z"/>
    <rect x="4.6" y="-1.5" width="2.8" height="4.5" rx="0.7" fill="#8B5A2B"/>
    <rect x="2.4" y="5.6" width="9.2" height="1.3" fill="#F5E6C8"/>
  </g>

  <!-- Finished roof -->
  <path fill="#DA251D" d="M23 27 29 21 35 27Z"/>
  <rect x="25.4" y="27" width="7.2" height="4.4" fill="#F5E6C8"/>
  <circle cx="29" cy="21" r="1.1" fill="#FFCD00"/>
</svg>
