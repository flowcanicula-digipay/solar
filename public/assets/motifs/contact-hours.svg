<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <!-- A lacquered wall clock face — time kept carefully, the craftsman's
       respect for the client's schedule. Not a generic clock outline. -->
  <!-- Outer ring / frame -->
  <circle cx="18" cy="18" r="14.5" fill="#B86F1C"/>
  <circle cx="18" cy="18" r="13" fill="#F5E6C8"/>
  <circle cx="18" cy="18" r="11.5" fill="none" stroke="#D9B872" stroke-width="0.7" opacity="0.6"/>
  <!-- Hour markers — 4 main -->
  <rect x="17.3" y="5" width="1.4" height="3.2" rx="0.7" fill="#8B5A2B"/>
  <rect x="17.3" y="27.8" width="1.4" height="3.2" rx="0.7" fill="#8B5A2B"/>
  <rect x="5" y="17.3" width="3.2" height="1.4" rx="0.7" fill="#8B5A2B"/>
  <rect x="27.8" y="17.3" width="3.2" height="1.4" rx="0.7" fill="#8B5A2B"/>
  <!-- Minor hour markers (8 of them, thin) -->
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(30 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(60 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(120 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(150 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(210 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(240 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(300 18 18)"/>
  <rect x="17.5" y="9" width="1" height="2" rx="0.5" fill="#C49A6C" opacity="0.7" transform="rotate(330 18 18)"/>
  <!-- Hour hand — pointing ~9 o'clock (Vietnamese morning open) -->
  <line x1="18" y1="18" x2="10.5" y2="18" stroke="#243329" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Minute hand — pointing ~12 -->
  <line x1="18" y1="18" x2="18" y2="9.5" stroke="#243329" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Center cap -->
  <circle cx="18" cy="18" r="1.8" fill="#DA251D"/>
  <circle cx="18" cy="18" r="0.8" fill="#FFCD00"/>
</svg>
