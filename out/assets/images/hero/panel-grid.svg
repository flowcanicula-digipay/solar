<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <pattern id="panelGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="none" stroke="#F8F5EE" stroke-width="1"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#F8F5EE" stroke-width="0.5"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#F8F5EE" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#panelGrid)"/>
</svg>
