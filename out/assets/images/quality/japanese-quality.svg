<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#F8F5EE"/>
  <text x="400" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#0C1F3F">25-year output comparison</text>
  <line x1="400" y1="80" x2="400" y2="430" stroke="#003baf" stroke-width="1"/>

  <text x="200" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2D2D2D">Standard panels</text>
  <g stroke="#cccccc" stroke-width="1">
    <line x1="90" y1="400" x2="340" y2="400"/>
    <line x1="90" y1="340" x2="340" y2="340"/>
    <line x1="90" y1="280" x2="340" y2="280"/>
    <line x1="90" y1="220" x2="340" y2="220"/>
    <line x1="90" y1="160" x2="340" y2="160"/>
  </g>
  <g fill="#4a4a4a">
    <rect x="100" y="170" width="30" height="230" />
    <rect x="150" y="195" width="30" height="205" />
    <rect x="200" y="230" width="30" height="170" />
    <rect x="250" y="270" width="30" height="130" />
    <rect x="300" y="320" width="30" height="80" />
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#2D2D2D" text-anchor="middle">
    <text x="115" y="415">0</text>
    <text x="165" y="415">5</text>
    <text x="215" y="415">10</text>
    <text x="265" y="415">15</text>
    <text x="315" y="415">20–25</text>
  </g>
  <text x="200" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4a4a4a">~65% output at year 25</text>

  <text x="600" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2D2D2D">Japanese panels — SolarTNP</text>
  <g stroke="#cccccc" stroke-width="1">
    <line x1="460" y1="400" x2="710" y2="400"/>
    <line x1="460" y1="340" x2="710" y2="340"/>
    <line x1="460" y1="280" x2="710" y2="280"/>
    <line x1="460" y1="220" x2="710" y2="220"/>
    <line x1="460" y1="160" x2="710" y2="160"/>
  </g>
  <g fill="#003baf">
    <rect x="470" y="170" width="30" height="230" />
    <rect x="520" y="178" width="30" height="222" />
    <rect x="570" y="187" width="30" height="213" />
    <rect x="620" y="197" width="30" height="203" />
    <rect x="670" y="208" width="30" height="192" />
  </g>
  <g font-family="Arial, sans-serif" font-size="12" fill="#2D2D2D" text-anchor="middle">
    <text x="485" y="415">0</text>
    <text x="535" y="415">5</text>
    <text x="585" y="415">10</text>
    <text x="635" y="415">15</text>
    <text x="685" y="415">20–25</text>
  </g>
  <text x="600" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#003baf">~89% output at year 25</text>
</svg>
