\",\"children\":\"The Core Rule: Self-Consumption First\"}],[\"$\",\"p\",null,{\"className\":\"mt-3 text-charcoal/80\",\"children\":\"Under Decree 135/2024/ND-CP, rooftop solar systems in Vietnam must be installed primarily for on-site, self-consumption. Your system capacity must generally match your existing electricity load at the time of registration. This is a feature, not a limitation — it means the system is sized correctly for your actual needs, not oversold.\"}]]}],[\"$\",\"div\",null,{\"children\":[[\"$\",\"h2\",null,{\"className\":\"font-display text-2xl font-bold text-navy-950\",\"children\":\"Selling Surplus Back to EVN (the 20% Cap)\"}],[\"$\",\"p\",null,{\"className\":\"mt-3 text-charcoal/80\",\"children\":\"You are permitted to export excess electricity to Vietnam Electricity (EVN), but this is strictly capped at 20% of your installed capacity. Surplus power sold to EVN is compensated at the preceding year's average electricity market price — not the older, higher feed-in tariffs. The honest implication: the financial case for solar is now built primarily on self-consumption savings, not surplus export revenue.\"}],[\"$\",\"p\",null,{\"className\":\"mt-3 font-mono text-sm font-semibold text-royal-700\",\"children\":\"Maximum surplus exported to EVN: 20% of installed capacity\"}]]}],[\"$\",\"div\",null,{\"children\":[[\"$\",\"h2\",null,{\"className\":\"font-display text-2xl font-bold text-navy-950\",\"children\":\"Off-Grid Exception\"}],[\"$\",\"p\",null,{\"className\":\"mt-3 text-charcoal/80\",\"children\":\"If your system is completely disconnected from the national grid, there are no capacity limits. This applies to remote properties or businesses choosing full energy independence with battery storage.\"}]]}],[\"$\",\"div\",null,{\"children\":[[\"$\",\"h2\",null,{\"className\":\"font-display text-2xl font-bold text-navy-950\",\"children\":\"Capacity Thresholds \u0026 Licensing\"}],[\"$\",\"p\",null,{\"className\":\"mt-3 text-charcoal/80\",\"children\":\"Presented as a clean comparison table:\"}],[\"$\",\"div\",null,{\"className\":\"mt-6\",\"children\":\"$L11\"}]]}],[\"$\",\"div\",null,{\"children\":[[\"$\",\"h2\",null,{\"className\":\"font-display text-2xl font-bold text-navy-950\",\"children\":\"Building Compliance Requirements\"}],[\"$\",\"p\",null,{\"className\":\"mt-3 text-charcoal/80\",\"children\":\"The rooftop system must be installed on buildings that fully comply with construction law, land-use rights, fire safety standards, and environmental regulations. SolarTNP verifies building compliance during the pre-installation site assessment — we will not proceed on a building with unresolved compliance issues.\"}]]}],[\"$\",\"div\",null,{\"children\":[[\"$\",\"h2\",null,{\"className\":\"font-display text-2xl font-bold text-navy-950\",\"children\":\"How SolarTNP Handles This\"}],[\"$\",\"ul\",null,{\"className\":\"mt-4 space-y-3\",\"children\":[[\"$\",\"li\",\"We size your system to your actual load — compliant by design\",{\"className\":\"flex gap-3 text-sm text-charcoal/80\",\"children\":[[\"$\",\"span\",null,{\"className\":\"mt-1 h-2 w-2 flex-shrink-0 rounded-full bg-royal-600\"}],\"We size your system to your actual load — compliant by design\"]}],\"$L12\",\"$L13\",\"$L14\",\"$L15\"]}]]}],\"$L16\",\"$L17\"]}]}]]\n"])</script><script>self.__next_f.push([1,"3:[\"$\",\"html\",null,{\"lang\":\"en\",\"className\":\"__variable_7f1bca __variable_75b79f\",\"children\":[[\"$\",\"head\",null,{\"children\":[\"$\",\"meta\",null,{\"httpEquiv\":\"Content-Security-Policy\",\"content\":\"default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formspree.io; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action https://formspree.io\"}]}],[\"$\",\"body\",null,{\"className\":\"flex min-h-screen flex-col bg-cream-50 font-sans text-charcoal antialiased\",\"children\":\"$L18\"}]]}]\n"])</scr on quality\",\"body\":\"SolarTNP brings Japanese sourcing standards to the Vietnamese solar market. We pair high-efficiency, long-warranty panels from trusted Japanese manufacturers with a Vietnamese installation crew that knows local roofs, local weather, and local grid realities. We are a young company — every system we've installed has been sized properly and installed without shortcuts.\",\"point1\":\"Japanese-sourced panels with 25-year linear output guarantees\",\"point2\":\"Our own installation crew — no subcontracting\",\"point3\":\"Full EVN grid-connection paperwork handled for you\",\"point4\":\"12 months of free callouts after every installation\"},\"process\":{\"title\":\"How It Works\",\"lead\":\"A clear, three-stage process — from first site visit to years of after-sales support.\",\"step1\":{\"title\":\"Design \u0026 Supply\",\"body\":\"We start with a site assessment and energy audit — roof space, average monthly consumption, grid situation. From there we size your system correctly and supply Japanese-sourced panels and inverters with full warranty documentation.\"},\"step2\":{\"title\":\"Installation\",\"body\":\"Our own crew — never a subcontractor — handles roof mounting, cable management, inverter wiring, grid connection, and commissioning, using Japanese-grade mounting hardware and code-compliant wiring throughout.\"},\"step3\":{\"title\":\"After-Sales \u0026 Maintenance\",\"body\":\"Solar systems run for 25+ years. We configure your monitoring app on install day, offer annual inspection and cleaning plans, and provide free callouts for the first 12 months.\"}},\"projects\":{\"title\":\"Our Installations\",\"lead\":\"Four real installations. Real sizes, real locations, real outcomes — no inflated numbers.\",\"honestNote\":\"We're a young company. These four projects are where we've started — each one done properly, without shortcuts. More are in progress.\",\"p1\":{\"title\":\"Biên Hòa Residence\",\"size\":\"5 kWp grid-tied\",\"panels\":\"16 × Panasonic 315W\",\"location\":\"Private residence, Biên Hòa, Đồng Nai\",\"duration\":\"2-day install\",\"outcome\":\"Monthly bill reduced from ~1,800,000 VND to ~400,000 VND\",\"note\":\"Our first installation. Vietnamese tile roof — we designed a custom mount that preserves waterproofing integrity.\",\"imageAlt\":\"Solar panels on a red tile roof under a clear sky, Biên Hòa residence\"},\"p2\":{\"title\":\"Thủ Đức Townhouse\",\"size\":\"8 kWp grid-tied\",\"panels\":\"20 × Sharp 400W\",\"location\":\"3-storey townhouse, Thủ Đức, Ho Chi Minh City\",\"duration\":\"3-day install\",\"outcome\":\"~1,040 kWh/month generation; surplus exported to EVN under net metering\",\"note\":\"Client was concerned about roof load — we provided a structural calculation before installing.\",\"imageAlt\":\"Modern townhouse with rooftop solar panels and the Ho Chi Minh City skyline\"},\"p3\":{\"title\":\"KCN Tam Phước Office\",\"size\":\"15 kWp grid-tied\",\"panels\":\"30 × Kyocera 500W\",\"location\":\"Office building, KCN Tam Phước industrial zone, Biên Hòa\",\"duration\":\"4-day install\",\"outcome\":\"~60% of daytime electricity offset; projected payback ~5.5 years\",\"note\":\"We handled EVN grid-connection approval end-to-end — 3 weeks from application to energisation.\",\"imageAlt\":\"Workers installing solar panels on an industrial rooftop\"},\"p4\":{\"title\":\"Long An Family Home\",\"size\":\"6.4 kWp grid-tied\",\"panels\":\"16 × Sharp 400W\",\"location\":\"Family home, Tân An, Long An\",\"duration\":\"2-day install\",\"outcome\":\"~830 kWh/month generation; energy net-zero in dry season\",\"note\":\"A rural province installation — we coordinated with the local EVN office for grid approval.\",\"imageAlt\":\"Solar panels on a rural family home roof with the Vietnamese flag in the background\"}},\"japanese\":{\"title\":\"Why Japanese Quality Matters\",\"body\":\"Vietnam's solar market has exploded in recent years — and quality inconsistency from cheap suppliers is a real pain point. Japanese panels carry 25-year linear output guarantees with degradation as low as 0.45% per year. Cheaper alternatives often degrade at 1.5–2% per year, losing half their output within 15 years. Over a 25-year system life, that gap almost always outweighs the upfront price difference.\",\"point1\":\"≤0.45% annual degradation — still producing ≥89% of rated output at year 25\",\"point2\":\"Tighter manufacturing tolerances and rigorous quality control\",\"point3\":\"Long, honoured warranty terms from established manufacturers\",\"imageAlt\":\"Chart comparing 25-year output degradation between standard panels and Japanese panels\"},\"cta\":{\"title\":\"Ready for a free site assessment?\",\"body\":\"Tell us about your roof and your electricity bill. We'll size a system that fits — no pressure, no inflated promises.\",\"button\":\"Get a Free Site Assessment\"}},\"pricing\":{\"hero\":{\"title\":\"Pricing \u0026 Payback\",\"subtitle\":\"Three system sizes, transparent inclusions, and an honest look at payback — sized to your roof, not oversold.\"},\"tiers\":{\"small\":{\"name\":\"Small\",\"tagline\":\"Apartments \u0026 small homes\",\"size\":\"3–5 kWp\",\"description\":\"Right-sized for a smaller household's daytime load — typically 4–10 panels depending on roof space and wattage.\",\"price\":\"From $X,XXX USD / XXX triệu VND — TODO: owner to set price range\"},\"medium\":{\"name\":\"Medium\",\"tagline\":\"Family homes \u0026 small offices\",\"size\":\"6–10 kWp\",\"description\":\"The most common residential size in our installs so far — covers most of a family home's daytime consumption.\",\"price\":\"From $X,XXX USD / XXX triệu VND — TODO: owner to set price range\"},\"large\":{\"name\":\"Large\",\"tagline\":\"Commercial \u0026 small factories\",\"size\":\"11–20 kWp\",\"description\":\"For offices, workshops, and small factories with higher daytime loads and larger roof areas.\",\"price\":\"Custom quote — contact us\"}},\"included\":{\"title\":\"What's Included at Every Tier\",\"items\":[\"Japanese-sourced panels and inverter with full warranty documentation\",\"Site assessment, energy audit, and structural load check\",\"Installation by our own crew — never a subcontractor\",\"EVN grid-connection paperwork and DOIT notification handled for you\",\"Monitoring app setup and walkthrough on install day\",\"12 months of free callouts after installation\"]},\"payback\":{\"title\":\"Estimated Payback\",\"note\":\"Figures below are estimates based on typical system sizes and current generation assumptions. Actual savings depend on your household load, roof orientation, and EVN tariffs at the time of installation. Ask us for a calculation specific to your bill.\",\"table\":{\"system\":\"System size\",\"savings\":\"Est. monthly savings\",\"cost\":\"System cost\",\"payback\":\"Est. payback\",\"todo\":\"TODO — owner to confirm\",\"perMonth\":\"/month\"}},\"faq\":{\"title\":\"Frequently Asked Questions\",\"q1\":{\"question\":\"Under Vietnam's current rules, how much surplus power can I sell to EVN?\",\"answer\":\"Under Decree 135/2024/ND-CP (effective 2024), surplus electricity exported to EVN is capped at 20% of your installed system capacity. The primary purpose of your system must be self-consumption. Surplus is compensated at the preceding year's average electricity market price — not the older, higher feed-in tariffs. For most residential clients, this means the financial case for solar is built primarily on self-consumption savings, not export revenue. SolarTNP sizes your system to your actual load so you maximise self-consumption and minimise the surplus that hits the 20% cap.\"},\"q2\":{\"question\":\"Do I need permits or approvals before installing?\",\"answer\":\"Yes. For systems under 100 kW (all residential and most small commercial), you need to file a simplified notification with the provincial Department of Industry and Trade (DOIT) — no full investment approval required. For systems 100 kW–1,000 kW, standard permitting with local authorities applies. For systems over 1,000 kW selling surplus to the grid, a development registration certificate and Power Operation License are required. SolarTNP handles the DOIT notification and all EVN grid-connection paperwork for systems in the sub-100 kW range — typical timeline: 3–6 weeks from submission to energisation.\"},\"q3\":{\"question\":\"Does my building need to comply with any requirements?\",\"answer\":\"Yes. Under Decree 135/2024/ND-CP, the system must be installed on a building that fully complies with construction law, land-use rights, fire safety standards, and environmental regulations. SolarTNP conducts a compliance check during the free site assessment. We will not proceed on a building with unresolved compliance issues — this protects you as much as it protects us.\"},\"q4\":{\"question\":\"Will the panels withstand typhoons?\",\"answer\":\"Our mounting systems are rated for wind loads significantly above Vietnam's standard building code minimums. We use Japanese-grade aluminium railing and stainless steel fasteners, anchored into roof structure — not just surface material. Every install includes a load calculation. We've designed for the Vietnamese climate specifically.\"},\"q5\":{\"question\":\"What roof types are compatible?\",\"answer\":\"We work with concrete flat roofs, Vietnamese tile roofs (ngói), corrugated metal (tôn), and composite or fibre-cement roofing. Each type uses a different mounting method. We confirm compatibility during the site visit — we don't proceed if the roof isn't suitable.\"},\"q6\":{\"question\":\"Why Japanese panels over cheaper alternatives?\",\"answer\":\"Japanese panels (Panasonic, Sharp, Kyocera) carry 25-year linear output guarantees with ≤0.45% annual degradation. At year 25, your panels are still producing at least 89% of rated output. Cheap panels often degrade at 1.5–2% per year — half your output gone within 15 years. Over 25 years, the performance gap almost always outweighs the upfront price difference. We provide the degradation comparison data to every client so you can make the calculation yourself.\"},\"q7\":{\"question\":\"What maintenance does a solar system need?\",\"answer\":\"Very little. Clean panels 2–4 times per year (dust, bird deposits). Annual professional inspection: connections, mounting torque, inverter health. SolarTNP offers annual maintenance plans. For the first 12 months after installation, all callouts are free.\"},\"q8\":{\"question\":\"Can you install outside Biên Hòa and Ho Chi Minh City?\",\"answer\":\"Yes, within southern Vietnam. We've completed installations in Đồng Nai and Long An. We assess remote locations case by case — travel and accommodation are quoted separately for distant provinces.\"}}},\"contact\":{\"hero\":{\"title\":\"Request a Free Site Assessment\",\"subtitle\":\"Tell us about your roof and your electricity bill. No pressure — just an honest look at what's possible.\"},\"form\":{\"name\":{\"label\":\"Full name\"},\"email\":{\"label\":\"Email\"},\"phone\":{\"label\":\"Phone / Zalo / WhatsApp\",\"hint\":\"We'll contact you on Zalo or WhatsApp\"},\"propertyType\":{\"label\":\"Property type\",\"options\":[\"House / Villa\",\"Townhouse / Shophouse\",\"Apartment\",\"Office / Commercial\",\"Factory / Warehouse\",\"Other\"]},\"roofArea\":{\"label\":\"Approximate roof area\",\"hint\":\"e.g. 60m² or \\\"not sure yet\\\"\"},\"province\":{\"label\":\"Province / City\",\"hint\":\"e.g. Biên Hòa, Thủ Đức, Long An\"},\"monthlyBill\":{\"label\":\"Monthly electricity bill\",\"hint\":\"Helps us size your system\",\"options\":[\"Under 500,000 VND\",\"500,000–1,000,000 VND\",\"1,000,000–2,000,000 VND\",\"Over 2,000,000 VND\",\"Not sure\"]},\"language\":{\"label\":\"Preferred follow-up language\",\"options\":[\"English\",\"Tiếng Việt\",\"日本語\"]},\"notes\":{\"label\":\"Notes / questions\"},\"submit\":\"Request Free Assessment\",\"privacy\":\"By submitting, you agree to our Privacy Policy. We'll only use your details to respond to this enquiry.\",\"success\":\"Thank you — we've received your request and will be in touch shortly.\",\"error\":\"Something went wrong sending your request. Please try again or email us directly.\"},\"sidebar\":{\"direct\":{\"title\":\"Direct Contact\"},\"hours\":\"Monday–Saturday, 8:00 AM – 5:30 PM (GMT+7)\",\"next\":{\"title\":\"What Happens Next\",\"step1\":\"We review your details and call or message you within 1–2 business days\",\"step2\":\"We schedule a free on-site visit to confirm roof condition and load\",\"step3\":\"You receive a detailed quote with system size, equipment, and price\"},\"trust\":\"This is a no-pressure conversation. We'll tell you honestly if solar isn't a good fit for your situation.\"}},\"privacy\":{\"title\":\"Privacy Policy\",\"lastUpdated\":\"Last updated: June 2026\",\"intro\":\"This page explains what information SolarTNP collects through this website, how we use it, and your rights regarding it.\",\"s01\":{\"heading\":\"What we collect\",\"body\":\"When you submit our contact form, we collect your name, email, phone number (optional), and project details (property type, location, roof area, monthly electricity bill, project notes). We use this solely to respond to your enquiry and prepare a quote. We do not collect data automatically through cookies beyond a single functional preference cookie for the language banner.\"},\"s02\":{\"heading\":\"How we use your data\",\"body\":\"Your contact details are used to respond to your site assessment request, prepare and send a quote, and follow up if you haven't received a response. We do not use your data for unsolicited marketing. We do not sell, rent, or share your data with third parties except where required by law.\"},\"s03\":{\"heading\":\"Data storage\",\"body\":\"Contact form submissions are processed via Formspree (formspree.io), a third-party form service. Formspree's privacy policy governs data processed on their platform. We retain your enquiry details for as long as necessary to fulfil your request or as required by Vietnamese law.\"},\"s04\":{\"heading\":\"Cookies\",\"body\":\"This website uses a single functional cookie to remember your language or privacy banner preference. No tracking cookies, advertising pixels, or analytics scripts are used. We do not use Google Analytics or any third-party tracking services.\"},\"s05\":{\"heading\":\"Your rights\",\"body\":\"You have the right to access, correct, or request deletion of your personal data. To exercise these rights, email thuy@tnpgr.vn. We will respond within 30 days.\"},\"s06\":{\"heading\":\"Contact us\",\"body\":\"For privacy questions: thuy@tnpgr.vn · +84 90 333 37 29. Lô 35 đường số 9, KCN Tam Phước, Biên Hòa, Vietnam.\"},\"backHome\":\"Back to Home\"},\"regulations\":{\"title\":\"Vietnam Solar Regulations — What You Need to Know\",\"subtitle\":\"Decree 135/2024/ND-CP governs rooftop solar in Vietnam. We've summarised what it means for your home or business installation — and how SolarTNP handles compliance for you.\",\"disclaimer\":\"This page summarises our understanding of Decree 135/2024/ND-CP as of the date below. Solar regulations in Vietnam evolve. This is not legal advice — consult a licensed energy or construction lawyer for binding guidance.\",\"s1\":{\"heading\":\"The Core Rule: Self-Consumption First\",\"body\":\"Under Decree 135/2024/ND-CP, rooftop solar systems in Vietnam must be installed primarily for on-site, self-consumption. Your system capacity must generally match your existing electricity load at the time of registration. This is a feature, not a limitation — it means the system is sized correctly for your actual needs, not oversold.\"},\"s2\":{\"heading\":\"Selling Surplus Back to EVN (the 20% Cap)\",\"body\":\"You are permitted to export excess electricity to Vietnam Electricity (EVN), but this is strictly capped at 20% of your installed capacity. Surplus power sold to EVN is compensated at the preceding year's average electricity market price — not the older, higher feed-in tariffs. The honest implication: the financial case for solar is now built primarily on self-consumption savings, not surplus export revenue.\",\"cap\":\"Maximum surplus exported to EVN: 20% of installed capacity\"},\"s3\":{\"heading\":\"Off-Grid Exception\",\"body\":\"If your system is completely disconnected from the national grid, there are no capacity limits. This applies to remote properties or businesses choosing full energy independence with battery storage.\"},\"s4\":{\"heading\":\"Capacity Thresholds \u0026 Licensing\",\"intro\":\"Presented as a clean comparison table:\",\"row1\":{\"range\":\"Under 100 kW\",\"who\":\"Households, small businesses\",\"process\":\"Simplified notification to provincial DOIT — no investment approval needed\"},\"row2\":{\"range\":\"100 kW – 1,000 kW\",\"who\":\"Mid-sized commercial / industrial\",\"process\":\"Standard permitting with local authorities\"},\"row3\":{\"range\":\"Over 1,000 kW (1 MW+)\",\"who\":\"Large commercial / industrial selling to grid\",\"process\":\"Development registration certificate + Power Operation License required\"},\"headers\":{\"capacity\":\"Capacity\",\"who\":\"Who\",\"process\":\"Process\"}},\"s5\":{\"heading\":\"Building Compliance Requirements\",\"body\":\"The rooftop system must be installed on buildings that fully comply with construction law, land-use rights, fire safety standards, and environmental regulations. SolarTNP verifies building compliance during the pre-installation site assessment — we will not proceed on a building with unresolved compliance issues.\"},\"s6\":{\"heading\":\"How SolarTNP Handles This\",\"items\":[\"We size your system to your actual load — compliant by design\",\"We prepare and submit your DOIT notification (under 100 kW)\",\"We coordinate EVN grid connection approval and inspection\",\"We document the 20% surplus cap in your system design specs\",\"We do not install on non-compliant buildings\"]},\"sources\":{\"label\":\"Sources\",\"note\":\"Decree 135/2024/ND-CP (official) · SP Global Energy Transition coverage (Oct 2024) · WFW guidance article · Vietnam Business Law blog (Jan 2025, Mar 2025) · Vietnam Law Magazine · Baker McKenzie InsightPlus\",\"lastVerified\":\"Last verified: 17 June 2026\"}},\"notFound\":{\"fourofour\":\"404\",\"tagline\":\"This page went off-grid.\",\"body\":\"The URL doesn't exist. Let's get you back somewhere sunny.\",\"goHome\":\"Go Home\",\"contact\":\"Contact Us\"},\"meta\":{\"home\":{\"title\":\"SolarTNP — Japanese-Quality Solar Installation in Vietnam\",\"description\":\"SolarTNP designs, supplies, and installs Japanese-sourced grid-tied solar systems in Biên Hòa, Đồng Nai, and southern Vietnam. Real installations, honest pricing.\"},\"pricing\":{\"title\":\"Solar Pricing \u0026 Payback — SolarTNP\",\"description\":\"Three system sizes, transparent inclusions, and an honest look at payback periods for solar in Vietnam. FAQ covers Decree 135/2024/ND-CP rules.\"},\"contact\":{\"title\":\"Request a Free Site Assessment — SolarTNP\",\"description\":\"Contact SolarTNP for a free solar site assessment in Biên Hòa, Ho Chi Minh City, or southern Vietnam. No-pressure quote based on your roof and electricity bill.\"},\"privacy\":{\"title\":\"Privacy Policy — SolarTNP\",\"description\":\"How SolarTNP collects, uses, and protects your information when you contact us for a solar site assessment.\"},\"regulations\":{\"title\":\"Vietnam Solar Regulations Explained — SolarTNP\",\"description\":\"A plain-language guide to Decree 135/2024/ND-CP — self-consumption rules, the 20% EVN surplus cap, and permitting thresholds for rooftop solar in Vietnam.\"}}},\"now\":\"$undefined\",\"timeZone\":\"Asia/Singapore\",\"children\":[\"$L1a\",\"$L1b\",\"$L1c\",\"$L1d\"]}]\n"])</script><script>self.__next_f.push([1,"1e:I[5722,[\"809\",\"static/chunks/809-0408ea668dd6f7f7.js\",\"707\",\"static/chunks/707-49554faf80ddab1c.js\",\"356\",\"static/chunks/356-1cbf59d25a49fb83.js\",\"450\",\"static/chunks/
